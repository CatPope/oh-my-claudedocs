name: Docs OMC CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: docs-omc-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check .mjs file syntax
        run: |
          set -euo pipefail
          echo "Checking hooks/*.mjs ..."
          for f in hooks/*.mjs; do
            [ -f "$f" ] || continue
            echo "  node --check $f"
            node --check "$f"
          done

          echo "Checking scripts/*.mjs ..."
          for f in scripts/*.mjs; do
            [ -f "$f" ] || continue
            echo "  node --check $f"
            node --check "$f"
          done

          echo "Checking install.mjs ..."
          node --check install.mjs

          echo "Checking .github/scripts/*.mjs ..."
          for f in .github/scripts/*.mjs; do
            [ -f "$f" ] || continue
            echo "  node --check $f"
            node --check "$f"
          done

          echo "Syntax check passed."

  install-verify:
    name: Install Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run install.mjs in temp environment
        run: |
          set -euo pipefail
          INSTALL_TARGET="$(mktemp -d)"
          echo "Installing to: ${INSTALL_TARGET}"

          # Run installer targeting a temp home directory
          HOME="${INSTALL_TARGET}" node install.mjs

          echo "Verifying rules placement..."
          test -d "${INSTALL_TARGET}/.claude/rules" || (echo "ERROR: rules directory not found" && exit 1)

          echo "Verifying hooks placement..."
          test -d "${INSTALL_TARGET}/.claude/hooks" || (echo "ERROR: hooks directory not found" && exit 1)

          echo "Verifying skills placement..."
          test -d "${INSTALL_TARGET}/.claude/skills" || (echo "ERROR: skills directory not found" && exit 1)

          echo "Install verification passed."

  template-integrity:
    name: Template Integrity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate template 15-line headers and L-value TOC
        run: |
          set -euo pipefail
          node - <<'EOF'
          import { readFileSync, readdirSync, statSync } from "fs";
          import { join, extname } from "path";

          const TEMPLATE_DIR = "skills/dev-init/templates/docs/dev";

          function collectTemplates(dir) {
            const results = [];
            for (const entry of readdirSync(dir)) {
              const full = join(dir, entry);
              if (statSync(full).isDirectory()) {
                results.push(...collectTemplates(full));
              } else if (extname(entry) === ".md") {
                results.push(full);
              }
            }
            return results;
          }

          const templates = collectTemplates(TEMPLATE_DIR);
          let errors = 0;

          for (const file of templates) {
            const lines = readFileSync(file, "utf8").split("\n");

            // Rule 1: line 15 (index 14) must be "---"
            const line15 = lines[14] ?? "";
            if (line15.trim() !== "---") {
              console.error(`FAIL [${file}]: line 15 is not "---" (got: "${line15}")`);
              errors++;
            }

            // Rule 2: L-value entries in TOC must reference valid line numbers
            const tocLines = lines.slice(0, 14);
            const lValuePattern = /\.\.\s+L(\d+)/g;
            for (const tocLine of tocLines) {
              let match;
              while ((match = lValuePattern.exec(tocLine)) !== null) {
                const claimed = parseInt(match[1], 10);
                if (claimed < 1 || claimed > lines.length) {
                  console.error(
                    `FAIL [${file}]: TOC references L${claimed} but file has only ${lines.length} lines`
                  );
                  errors++;
                }
              }
            }

            if (errors === 0 || (errors > 0 && line15.trim() === "---")) {
              // Only log pass for files that pass both checks
              const tocLValues = [];
              for (const tocLine of tocLines) {
                let m;
                const re = /\.\.\s+L(\d+)/g;
                while ((m = re.exec(tocLine)) !== null) {
                  tocLValues.push(parseInt(m[1], 10));
                }
              }
              const allValid = tocLValues.every((l) => l >= 1 && l <= lines.length);
              if (line15.trim() === "---" && allValid) {
                console.log(`OK  [${file}]`);
              }
            }
          }

          if (errors > 0) {
            console.error(`\nTemplate integrity check failed with ${errors} error(s).`);
            process.exit(1);
          }

          console.log(`\nAll ${templates.length} template(s) passed integrity check.`);
          EOF

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scan for leaked secrets
        run: node .github/scripts/scan-secrets.mjs --history 80

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run npm audit (if package.json exists)
        id: audit
        run: |
          set -euo pipefail
          if [ ! -f package.json ]; then
            echo "no_package=true" >> "$GITHUB_OUTPUT"
            echo "No package.json found — skipping npm audit."
            exit 0
          fi
          echo "no_package=false" >> "$GITHUB_OUTPUT"
          npm audit --omit=dev --json > npm-audit.json || true

      - name: Enforce dependency audit gate
        if: steps.audit.outputs.no_package != 'true'
        run: node .github/scripts/check-dependency-audit.mjs npm-audit.json

      - name: Upload dependency audit artifact
        if: always() && steps.audit.outputs.no_package != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: npm-audit.json

  final-digest:
    name: Docs OMC CI
    runs-on: ubuntu-latest
    if: always()
    needs:
      - syntax-check
      - install-verify
      - template-integrity
      - secret-scan
      - dependency-audit

    steps:
      - name: Check upstream job results
        run: |
          fail=false

          report() {
            name="$1"
            result="$2"
            echo "${name}: ${result}"
            if [ "${result}" = "failure" ] || [ "${result}" = "cancelled" ]; then
              fail=true
            fi
          }

          report "Syntax Check"       "${{ needs.syntax-check.result }}"
          report "Install Verify"     "${{ needs.install-verify.result }}"
          report "Template Integrity" "${{ needs.template-integrity.result }}"
          report "Secret Scan"        "${{ needs.secret-scan.result }}"
          report "Dependency Audit"   "${{ needs.dependency-audit.result }}"

          if [ "${fail}" = true ]; then
            echo "One or more Docs OMC CI jobs failed."
            exit 1
          fi

          echo "Docs OMC CI aggregate check passed."

      - name: Post final CI digest
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SYNTAX_RESULT:    ${{ needs.syntax-check.result }}
          INSTALL_RESULT:   ${{ needs.install-verify.result }}
          TEMPLATE_RESULT:  ${{ needs.template-integrity.result }}
          SECRET_RESULT:    ${{ needs.secret-scan.result }}
          AUDIT_RESULT:     ${{ needs.dependency-audit.result }}
        with:
          script: |
            const marker = "<!-- docs-omc-ci-final-digest -->";
            const prNumber = context.payload.pull_request?.number;

            if (!prNumber) {
              core.notice("Skip: no pull request context.");
              return;
            }

            const { owner, repo } = context.repo;
            const headSha = context.payload.pull_request.head.sha;

            const statusLabel = (result) => {
              if (result === "success")   return "SUCCESS";
              if (result === "failure")   return "FAILURE";
              if (result === "cancelled") return "CANCELLED";
              if (result === "skipped")   return "SKIPPED";
              return result ? result.toUpperCase() : "UNKNOWN";
            };

            const rows = [
              ["Syntax Check",       process.env.SYNTAX_RESULT],
              ["Install Verify",     process.env.INSTALL_RESULT],
              ["Template Integrity", process.env.TEMPLATE_RESULT],
              ["Secret Scan",        process.env.SECRET_RESULT],
              ["Dependency Audit",   process.env.AUDIT_RESULT],
            ];

            const tableRows = rows.map(([name, result]) =>
              `| ${name} | ${statusLabel(result)} |`
            );

            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;

            const bodyLines = [
              marker,
              "## Docs OMC CI — Final Digest",
              "",
              `Head SHA: \`${headSha}\``,
              `Workflow run: [#${context.runId}](${runUrl})`,
              "",
              "| Job | Result |",
              "|---|---|",
              ...tableRows,
              "",
              "_자동 생성 코멘트입니다._",
            ];

            const body = bodyLines.join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(
              (c) =>
                c.user?.login === "github-actions[bot]" &&
                typeof c.body === "string" &&
                c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }
